<!DOCTYPE html>
<html lang="es" class="transition-colors duration-300"> <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Control de Temperaturas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Habilita el Dark Mode por clase
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased p-2 sm:p-4 min-h-screen">

  <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors duration-300">
    
    <div class="bg-blue-600 dark:bg-blue-800 text-white px-5 py-4 sm:px-6 sm:py-5 flex items-center gap-3">
      <i class="ph ph-thermometer text-3xl sm:text-4xl"></i>
      <div>
        <h2 class="text-lg sm:text-xl font-bold leading-tight">Control Operativo de Cámaras</h2>
        <p class="text-xs sm:text-sm text-blue-100 font-medium mt-0.5" id="txt-usuario-activo">
          <i class="ph ph-spinner animate-spin inline-block"></i> Cargando sesión...
        </p>
      </div>
    </div>

    <div class="p-4 sm:p-6 md:p-8">
      <form id="form-lectura-camara" class="space-y-5 sm:space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6">
          <div class="md:col-span-2">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Cámara a controlar</label>
            <select id="camara-select" required disabled class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50 dark:bg-gray-700 dark:text-white py-3 sm:py-4 px-4 border transition-colors cursor-not-allowed">
              <option value="">Cargando catálogo...</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Fecha</label>
            <input type="date" id="val-fecha" required class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 dark:text-white py-3 sm:py-4 px-4 border">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Turno de Lectura</label>
          <div id="turnos-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3">
             <div class="col-span-2 sm:col-span-3 md:col-span-6 text-sm text-gray-500 dark:text-gray-400 py-4 text-center bg-gray-50 dark:bg-gray-800 rounded-xl border border-dashed dark:border-gray-600">
                Seleccione una cámara primero...
             </div>
          </div>
          <input type="hidden" id="turno-seleccionado" required>
        </div>

        <div id="banner-limites" class="hidden bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-200 text-sm p-3 sm:p-4 rounded-xl border border-blue-200 dark:border-blue-800 flex flex-col sm:flex-row sm:items-center justify-between gap-2 shadow-inner">
           <span id="txt-limites-temp" class="flex items-center gap-2"></span>
           <span id="txt-limites-hr" class="flex items-center gap-2 font-medium"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Temperatura (°C)</label>
            <input type="number" step="0.1" id="val-temp" required placeholder="Ej. -18.5" class="w-full text-2xl sm:text-3xl font-black text-gray-900 dark:text-white rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 sm:py-4 px-4 border placeholder-gray-300 dark:placeholder-gray-500 transition-all text-center sm:text-left">
          </div>
          <div id="box-humedad" class="hidden">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Humedad Relativa (%)</label>
            <input type="number" step="0.1" id="val-humedad" placeholder="Ej. 85.0" class="w-full text-2xl sm:text-3xl font-black text-gray-900 dark:text-white rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 sm:py-4 px-4 border placeholder-gray-300 dark:placeholder-gray-500 transition-all text-center sm:text-left">
          </div>
        </div>

        <div id="panel-estado" class="hidden rounded-xl p-3 sm:p-4 border flex items-start gap-3 sm:gap-4 transition-colors duration-300 shadow-sm">
           <div id="icono-estado" class="mt-0.5 sm:mt-1"></div>
           <div class="flex-1">
              <h4 id="titulo-estado" class="font-bold text-base sm:text-lg mb-0.5 sm:mb-1"></h4>
              <p id="desc-estado" class="text-xs sm:text-sm font-medium leading-tight"></p>
           </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Medidas Correctivas / Observaciones</label>
          <textarea id="val-incidencia" rows="2" placeholder="Opcional. Obligatorio si hay desviación..." class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-red-500 focus:border-red-500 bg-white dark:bg-gray-700 dark:text-white py-3 px-4 border transition-colors"></textarea>
        </div>

        <div class="pt-2">
          <button type="submit" id="btn-guardar-lectura" disabled class="w-full bg-gray-400 dark:bg-gray-600 text-white font-bold py-4 sm:py-5 px-4 rounded-xl transition-all flex justify-center items-center gap-2 shadow-md cursor-not-allowed text-lg">
            <i class="ph ph-lock-key text-2xl"></i> Esperando autorización...
          </button>
        </div>

      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
