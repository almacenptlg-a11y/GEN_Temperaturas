<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Temperaturas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* Ocultar barra de scroll pero permitir scroll */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased p-2 md:p-4 min-h-screen">

  <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    
    <div class="bg-blue-600 text-white px-6 py-4 flex items-center gap-3">
      <i class="ph ph-thermometer text-3xl"></i>
      <div>
        <h2 class="text-xl font-bold">Control Operativo de Cámaras</h2>
        <p class="text-sm text-blue-100 font-medium" id="txt-usuario-activo">
          <i class="ph ph-spinner animate-spin inline-block"></i> Cargando sesión...
        </p>
      </div>
    </div>
<div class="p-6 md:p-8">
      <form id="form-lectura-camara" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2">
            <label class="block text-sm font-bold text-gray-700 mb-2">Cámara a controlar</label>
            <select id="camara-select" required disabled class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50 py-3 px-4 border transition-colors cursor-not-allowed">
              <option value="">Cargando catálogo...</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <label class="block text-sm font-bold text-gray-700 mb-2">Fecha</label>
            <input type="date" id="val-fecha" required class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white py-3 px-4 border">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Turno de Lectura</label>
          <div id="turnos-container" class="grid grid-cols-3 md:grid-cols-6 gap-3">
             <div class="col-span-3 md:col-span-6 text-sm text-gray-500 py-3 text-center bg-gray-50 rounded-lg border border-dashed">
                Seleccione una cámara primero...
             </div>
          </div>
          <input type="hidden" id="turno-seleccionado" required>
        </div>

        <div id="banner-limites" class="hidden bg-blue-50 text-blue-800 text-sm p-4 rounded-lg border border-blue-200 flex flex-col md:flex-row md:items-center justify-between gap-2 shadow-inner">
           <span id="txt-limites-temp" class="flex items-center gap-2"></span>
           <span id="txt-limites-hr" class="flex items-center gap-2 font-medium"></span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Temperatura (°C)</label>
            <input type="number" step="0.1" id="val-temp" required placeholder="Ej. -18.5" class="w-full text-2xl font-black text-gray-900 rounded-lg border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 px-4 border placeholder-gray-300 transition-all">
          </div>
          <div id="box-humedad" class="hidden">
            <label class="block text-sm font-bold text-gray-700 mb-2">Humedad Relativa (%)</label>
            <input type="number" step="0.1" id="val-humedad" placeholder="Ej. 85.0" class="w-full text-2xl font-black text-gray-900 rounded-lg border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 px-4 border placeholder-gray-300 transition-all">
          </div>
        </div>

        <div id="panel-estado" class="hidden rounded-lg p-4 border flex items-start gap-4 transition-colors duration-300 shadow-sm">
           <div id="icono-estado" class="mt-1"></div>
           <div class="flex-1">
              <h4 id="titulo-estado" class="font-bold text-lg mb-1"></h4>
              <p id="desc-estado" class="text-sm font-medium"></p>
           </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Medidas Correctivas / Observaciones</label>
          <textarea id="val-incidencia" rows="2" placeholder="Opcional. Si el estado marca DESVIACIÓN, este campo será obligatorio..." class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-red-500 focus:border-red-500 py-3 px-4 border transition-colors"></textarea>
        </div>

        <div class="pt-2">
          <button type="submit" id="btn-guardar-lectura" disabled class="w-full bg-gray-400 text-white font-bold py-4 px-4 rounded-lg transition-all flex justify-center items-center gap-2 shadow-md cursor-not-allowed">
            <i class="ph ph-lock-key text-2xl"></i> Esperando autorización...
          </button>
        </div>

      </form>
    </div>
  
  </div>

  <script src="script.js"></script>
</body>
</html>
