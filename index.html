<!DOCTYPE html>
<html lang="es" class="transition-colors duration-300"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
  <title>Control de Temperaturas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Habilita el Dark Mode por clase
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased p-2 sm:p-4 min-h-screen">

  <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors duration-300">
    
    <div class="bg-blue-600 dark:bg-blue-800 text-white px-5 py-4 sm:px-6 sm:py-5 flex items-center gap-3">
      <i class="ph ph-thermometer text-3xl sm:text-4xl"></i>
      <div>
        <h2 class="text-lg sm:text-xl font-bold leading-tight">Control Operativo de Cámaras</h2>
        <p class="text-xs sm:text-sm text-blue-100 font-medium mt-0.5" id="txt-usuario-activo">
          <i class="ph ph-spinner animate-spin inline-block"></i> Cargando sesión...
        </p>
      </div>
    </div>

    <div class="flex border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
      <button id="tab-registro" class="flex-1 py-3 px-4 font-bold text-sm sm:text-base border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 transition-colors">
        <i class="ph ph-pencil-simple inline-block align-middle mr-1 text-lg"></i> Registro Diario
      </button>
      <button id="tab-revision" class="flex-1 py-3 px-4 font-bold text-sm sm:text-base border-b-2 border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
        <i class="ph ph-table inline-block align-middle mr-1 text-lg"></i> Revisión Jefatura
      </button>
    </div>

    <div id="vista-registro" class="p-4 sm:p-6 md:p-8 block">
      <form id="form-lectura-camara" class="space-y-5 sm:space-y-6">

        <div id="banner-limites" class="hidden bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-200 text-sm p-3 sm:p-4 rounded-xl border border-blue-200 dark:border-blue-800 flex flex-col sm:flex-row sm:items-center justify-between gap-2 shadow-inner">
           <span id="txt-limites-temp" class="flex items-center gap-2"></span>
           <span id="txt-limites-hr" class="flex items-center gap-2 font-medium"></span>
        </div>
         <div id="panel-estado" class="hidden rounded-xl p-3 sm:p-4 border flex items-start gap-3 sm:gap-4 transition-colors duration-300 shadow-sm">
           <div id="icono-estado" class="mt-0.5 sm:mt-1"></div>
           <div class="flex-1">
              <h4 id="titulo-estado" class="font-bold text-base sm:text-lg mb-0.5 sm:mb-1"></h4>
              <p id="desc-estado" class="text-xs sm:text-sm font-medium leading-tight"></p>
           </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6">
          <div class="md:col-span-2">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Cámara a controlar</label>
            <select id="camara-select" required disabled class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50 dark:bg-gray-700 dark:text-white py-3 sm:py-4 px-4 border transition-colors cursor-not-allowed">
              <option value="">Cargando catálogo...</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Fecha</label>
            <input type="date" id="val-fecha" required class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 dark:text-white py-3 sm:py-4 px-4 border">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Turno de Lectura</label>
          <div id="turnos-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3">
             <div class="col-span-2 sm:col-span-3 md:col-span-6 text-sm text-gray-500 dark:text-gray-400 py-4 text-center bg-gray-50 dark:bg-gray-800 rounded-xl border border-dashed dark:border-gray-600">
                Seleccione una cámara primero...
             </div>
          </div>
          <input type="hidden" id="turno-seleccionado" required>
        </div>

        

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Temperatura (°C)</label>
            <input type="number" step="0.1" id="val-temp" required placeholder="Ej. -18.5" class="w-full text-2xl sm:text-3xl font-black text-gray-900 dark:text-white rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 sm:py-4 px-4 border placeholder-gray-300 dark:placeholder-gray-500 transition-all text-center sm:text-left">
          </div>
          <div id="box-humedad" class="hidden">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Humedad Relativa (%)</label>
            <input type="number" step="0.1" id="val-humedad" placeholder="Ej. 85.0" class="w-full text-2xl sm:text-3xl font-black text-gray-900 dark:text-white rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 py-3 sm:py-4 px-4 border placeholder-gray-300 dark:placeholder-gray-500 transition-all text-center sm:text-left">
          </div>
        </div>

       

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-2">Medidas Correctivas / Observaciones</label>
          <textarea id="val-incidencia" rows="2" placeholder="Opcional. Obligatorio si hay desviación..." class="w-full rounded-xl border-gray-300 dark:border-gray-600 shadow-sm focus:ring-red-500 focus:border-red-500 bg-white dark:bg-gray-700 dark:text-white py-3 px-4 border transition-colors"></textarea>
        </div>

        <div class="pt-2">
          <button type="submit" id="btn-guardar-lectura" disabled class="w-full bg-gray-400 dark:bg-gray-600 text-white font-bold py-4 sm:py-5 px-4 rounded-xl transition-all flex justify-center items-center gap-2 shadow-md cursor-not-allowed text-lg">
            <i class="ph ph-lock-key text-2xl"></i> Esperando autorización...
          </button>
        </div>

      </form>
    </div>

    <div id="vista-revision" class="p-4 sm:p-6 md:p-8 hidden">
      
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6 p-4 bg-gray-50 dark:bg-gray-800/80 rounded-xl border border-gray-200 dark:border-gray-700">
        <div>
          <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Cámara</label>
          <select id="rev-camara" class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white py-2 px-3 border shadow-sm">
            <option value="">Cargando...</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Mes</label>
          <select id="rev-mes" class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white py-2 px-3 border shadow-sm">
            <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
            <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Año</label>
          <select id="rev-anio" class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white py-2 px-3 border shadow-sm">
            <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
          </select>
        </div>
        <div class="sm:col-span-3">
          <button type="button" id="btn-generar-reporte" class="w-full bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
            <i class="ph ph-magnifying-glass text-xl"></i> Generar Matriz de Temperaturas
          </button>
        </div>
      </div>

      <div id="tabla-container" class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm hidden">
        <table class="w-full text-sm text-left whitespace-nowrap">
          <thead class="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-700 dark:text-gray-300" id="tabla-head">
            </thead>
          <tbody id="tabla-body" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
            </tbody>
        </table>
      </div>

      <div id="tabla-mensaje" class="text-center py-10 text-gray-500 dark:text-gray-400 hidden">
        </div>

    </div>

  </div>

 <div id="modal-edicion" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4 transition-opacity">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-transform">
      <div class="bg-blue-600 dark:bg-blue-800 px-5 py-4 flex justify-between items-center">
        <h3 id="modal-titulo" class="text-white font-bold text-lg flex items-center gap-2">
          <i class="ph ph-pencil-simple text-2xl"></i> Editar Registro
        </h3>
        <button type="button" onclick="cerrarModalEdicion()" class="text-white hover:text-gray-200 transition-colors">
          <i class="ph ph-x text-2xl"></i>
        </button>
      </div>
      
      <form id="form-editar-lectura" class="p-5 space-y-4">
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-fecha">
        <input type="hidden" id="edit-turno">
        
        <div class="bg-blue-50 dark:bg-blue-900/30 p-3 rounded-lg text-sm text-blue-800 dark:text-blue-200 font-medium mb-2" id="edit-info-contexto">
          </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Temp (°C)</label>
            <input type="number" step="0.1" id="edit-temp" required class="w-full text-xl font-bold rounded-lg border-gray-300 dark:border-gray-600 focus:ring-blue-500 focus:border-blue-500 py-2 px-3 border dark:bg-gray-700 dark:text-white">
          </div>
          <div id="edit-box-humedad">
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Hum (%)</label>
            <input type="number" step="0.1" id="edit-humedad" class="w-full text-xl font-bold rounded-lg border-gray-300 dark:border-gray-600 focus:ring-blue-500 focus:border-blue-500 py-2 px-3 border dark:bg-gray-700 dark:text-white">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Observaciones</label>
          <textarea id="edit-incidencia" rows="2" placeholder="Motivo o corrección..." class="w-full rounded-lg border-gray-300 dark:border-gray-600 focus:ring-blue-500 py-2 px-3 border dark:bg-gray-700 dark:text-white"></textarea>
        </div>

        <div class="pt-3 flex gap-3">
          <button type="button" onclick="cerrarModalEdicion()" class="flex-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
          <button type="submit" id="btn-guardar-edicion" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors flex justify-center items-center gap-2">
            <span id="modal-btn-text">Actualizar</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
